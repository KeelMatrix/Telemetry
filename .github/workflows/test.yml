name: Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore
        run: dotnet restore KeelMatrix.Telemetry.slnx

      - name: Test
        run: dotnet test KeelMatrix.Telemetry.slnx --no-restore --configuration Release

  test-dependabot:
    if: github.actor == 'dependabot[bot]'
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore
        run: dotnet restore KeelMatrix.Telemetry.slnx

      - name: Test
        run: dotnet test KeelMatrix.Telemetry.slnx --no-restore --configuration Release
